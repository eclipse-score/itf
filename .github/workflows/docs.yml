name: Verify and Build Docs

permissions:
  contents: read

on:
  push:

jobs:
  docs-build:
    uses: eclipse-score/cicd-workflows/.github/workflows/docs.yml@docs_debug
    permissions:
      contents: write
      pages: write
      pull-requests: write
      id-token: write
    with:
      bazel-target: "//:docs -- --github_user=${{ github.repository_owner }} --github_repo=${{ github.event.repository.name }}"
      retention-days: 3
